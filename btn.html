<!DOCTYPE html>
<html lang="en">
    <head>
        <title>btn</title>
        <meta charset="UTF-8">
        
        
        <body style="padding-bottom:1000px;
        background-color:rgb(235, 127, 127)">
            <style>
                .Container{
                    display:grid;
                    grid-template:1fr 1fr 1fr;
                    gap:40px;
                    padding:50px;
                     grid:row;
                    justify-content: center;
                   
                }
                .box-1{
                    background-color: azure;
                    height:120px;
                    width:160px;
                    box-shadow:5px 5px 10px lightskyblue;
                }
                p{
                    text-align:center;
                    text-decoration:none;
                }
                .box-2{
                    background-color:red;
                    color:blue;
                    box-shadow:10px 10px 10px black;
                    height:90px;
                    width:140px;
                    font-size:12px;
                    font-weight:bold;
                    font-family:Verdana;
                    border:dotted purple;
                }
                .box-3{
                    background-color:brown;
                    color:black;
                    box-shadow:10px 10px 10px white;
                    height:70px;
                    width:110px;
                    font-weight:bold;
                    font-family:Arial;
                    border:dotted black;
                }
                .box-4{
                     background-color:orangered;
                     color:white;
                     height:50px;
                     width:100px;
                     border:solid #999 ;
                     font-weight:bold;
                }
                .box-5{
                    background-color:rgb(27, 27, 221);
                    color:pink;
                    height:35px;
                    width:65px;
                    border:solid rgb(152, 177, 40);
                    font-family:Lucida Sans;
                    font-weight:bold;
                }
                
            </style>
        <div class="Container">
            <div class="box-1"> 
                <p>box1</p></div>
                <div class="box-2">
                    <p>box2</p> </div>
                    <div class="box-3">
                        <P>box-3</P>  </div>
                        <div class="box-4">
                            <p>box-4</p></div>
                            <div class="box-5"> 
                                <p>box-5</p>
                        </div>
        </body>
    </head>

</html>
