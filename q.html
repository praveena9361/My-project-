<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Science Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --card-border: #1e2d45;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --correct: #10b981;
      --wrong: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --glow: 0 0 20px rgba(0,212,255,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.7s ease both;
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      display: block;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
    }

    .progress-bar-wrap {
      max-width: 720px;
      margin: 0 auto 40px;
      animation: fadeDown 0.7s 0.1s ease both;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 4px;
      background: var(--card-border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    .quiz-container {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease forwards;
      transition: border-color 0.3s;
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .question-card.answered::before { opacity: 1; }

    .q-number {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .q-text {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.55;
      margin-bottom: 22px;
      color: #f1f5f9;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 18px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .option:hover:not(.disabled) {
      border-color: var(--accent);
      background: rgba(0,212,255,0.05);
      transform: translateX(4px);
    }

    .option.selected {
      border-color: var(--accent);
      background: rgba(0,212,255,0.08);
    }

    .option.correct {
      border-color: var(--correct);
      background: rgba(16,185,129,0.1);
    }

    .option.wrong {
      border-color: var(--wrong);
      background: rgba(239,68,68,0.08);
    }

    .option.disabled { cursor: default; }

    .opt-letter {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .option.selected .opt-letter { background: var(--accent); color: #000; border-color: var(--accent); }
    .option.correct .opt-letter { background: var(--correct); color: #fff; border-color: var(--correct); }
    .option.wrong .opt-letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }

    .opt-text {
      font-size: 14.5px;
      color: var(--text);
      line-height: 1.4;
    }

    .feedback {
      margin-top: 14px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }

    .feedback.show { display: flex; align-items: center; gap: 8px; }
    .feedback.correct-fb { background: rgba(16,185,129,0.1); color: var(--correct); border: 1px solid rgba(16,185,129,0.2); }
    .feedback.wrong-fb { background: rgba(239,68,68,0.08); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

    .submit-wrap {
      text-align: center;
      margin-top: 16px;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      padding: 16px 48px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(0,212,255,0.2);
      transition: all 0.2s ease;
    }

    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,212,255,0.35); }
    .btn-submit:active { transform: translateY(0); }

    /* Result screen */
    #result-screen {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    .score-ring {
      width: 160px;
      height: 160px;
      margin: 0 auto 32px;
      position: relative;
    }

    .score-ring svg { transform: rotate(-90deg); }

    .score-ring circle {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
    }

    .ring-bg { stroke: var(--card-border); }
    .ring-fill { stroke: url(#grad); transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1); }

    .score-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-num {
      font-family: 'Space Mono', monospace;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
    }

    .score-total {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .result-title {
      font-family: 'Space Mono', monospace;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .result-sub { color: var(--muted); margin-bottom: 32px; }

    .btn-retry {
      background: transparent;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid var(--accent);
      padding: 14px 36px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-retry:hover { background: rgba(0,212,255,0.1); box-shadow: var(--glow); }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 600px) {
      .question-card { padding: 20px; }
      .q-text { font-size: 15px; }
    }
  </style>
</head>
<body>

<header>
  <span class="label">⚗️ General Science</span>
  <h1>Science Quiz</h1>
  <p class="subtitle">10 questions · Choose the correct answer</p>
</header>

<div id="quiz-wrapper">
  <div class="progress-bar-wrap">
    <div class="progress-meta">
      <span id="answered-count">0 / 10 answered</span>
      <span id="score-live">Score: 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="quiz-container" id="quiz-container"></div>

  <div class="submit-wrap">
    <button class="btn-submit" onclick="submitQuiz()">Submit Quiz</button>
  </div>
</div>

<!-- Result screen -->
<div id="result-screen">
  <div class="score-ring">
    <svg width="160" height="160" viewBox="0 0 160 160">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#00d4ff"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="80" cy="80" r="70"/>
      <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="70"
        stroke-dasharray="439.82"
        stroke-dashoffset="439.82"/>
    </svg>
    <div class="score-label">
      <span class="score-num" id="final-score">0</span>
      <span class="score-total">out of 10</span>
    </div>
  </div>
  <h2 class="result-title" id="result-title">Well Done!</h2>
  <p class="result-sub" id="result-sub">You answered all questions.</p>
  <button class="btn-retry" onclick="retryQuiz()">↺ &nbsp; Try Again</button>
</div>

<script>
  const questions = [
    {
      q: "What is the chemical symbol for water?",
      options: ["HO", "H₂O", "H₂O₂", "OH"],
      answer: 1,
      explanation: "Water is H₂O — two hydrogen atoms bonded to one oxygen atom."
    },
    {
      q: "Which planet is known as the Red Planet?",
      options: ["Venus", "Jupiter", "Mars", "Saturn"],
      answer: 2,
      explanation: "Mars appears red due to iron oxide (rust) on its surface."
    },
    {
      q: "What is the speed of light in a vacuum (approximately)?",
      options: ["3 × 10⁶ m/s", "3 × 10⁸ m/s", "3 × 10¹⁰ m/s", "3 × 10⁴ m/s"],
      answer: 1,
      explanation: "Light travels at approximately 3 × 10⁸ metres per second in a vacuum."
    },
    {
      q: "Which organ in the human body produces insulin?",
      options: ["Liver", "Kidney", "Pancreas", "Stomach"],
      answer: 2,
      explanation: "The pancreas produces insulin, which regulates blood sugar levels."
    },
    {
      q: "What is the powerhouse of the cell?",
      options: ["Nucleus", "Ribosome", "Mitochondria", "Golgi Apparatus"],
      answer: 2,
      explanation: "Mitochondria produce ATP, the energy currency of cells."
    },
    {
      q: "Which gas makes up the majority of Earth's atmosphere?",
      options: ["Oxygen", "Carbon Dioxide", "Argon", "Nitrogen"],
      answer: 3,
      explanation: "Nitrogen makes up about 78% of Earth's atmosphere."
    },
    {
      q: "What is the atomic number of Carbon?",
      options: ["6", "8", "12", "14"],
      answer: 0,
      explanation: "Carbon has 6 protons, giving it an atomic number of 6."
    },
    {
      q: "Which law states that force equals mass times acceleration?",
      options: ["Newton's First Law", "Newton's Second Law", "Newton's Third Law", "Hooke's Law"],
      answer: 1,
      explanation: "Newton's Second Law: F = ma (Force = mass × acceleration)."
    },
    {
      q: "What type of bond involves the sharing of electron pairs between atoms?",
      options: ["Ionic bond", "Metallic bond", "Covalent bond", "Hydrogen bond"],
      answer: 2,
      explanation: "Covalent bonds are formed by the sharing of electron pairs between atoms."
    },
    {
      q: "Which vitamin is produced when human skin is exposed to sunlight?",
      options: ["Vitamin A", "Vitamin B12", "Vitamin C", "Vitamin D"],
      answer: 3,
      explanation: "Sunlight triggers the synthesis of Vitamin D in skin cells."
    }
  ];

  const letters = ['A','B','C','D'];
  let userAnswers = new Array(10).fill(null);
  let answered = 0;
  let score = 0;

  function buildQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    userAnswers = new Array(10).fill(null);
    answered = 0;
    score = 0;
    updateMeta();

    questions.forEach((q, qi) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `card-${qi}`;
      card.style.animationDelay = `${qi * 0.06}s`;

      const opts = q.options.map((opt, oi) => `
        <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
          <span class="opt-letter">${letters[oi]}</span>
          <span class="opt-text">${opt}</span>
        </div>
      `).join('');

      card.innerHTML = `
        <div class="q-number">Question ${qi + 1} of 10</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${opts}</div>
        <div class="feedback" id="fb-${qi}"></div>
      `;
      container.appendChild(card);
    });
  }

  function selectOption(qi, oi) {
    if (userAnswers[qi] !== null) return; // already answered

    const wasAnswered = userAnswers[qi] !== null;
    const correct = questions[qi].answer;
    userAnswers[qi] = oi;

    if (!wasAnswered) {
      answered++;
      if (oi === correct) score++;
    }

    // Style options
    questions[qi].options.forEach((_, idx) => {
      const el = document.getElementById(`opt-${qi}-${idx}`);
      el.classList.add('disabled');
      if (idx === oi) el.classList.add(oi === correct ? 'correct' : 'wrong');
      if (idx === correct && oi !== correct) el.classList.add('correct');
    });

    // Feedback
    const fb = document.getElementById(`fb-${qi}`);
    fb.classList.add('show');
    if (oi === correct) {
      fb.classList.add('correct-fb');
      fb.innerHTML = `✓ Correct! ${questions[qi].explanation}`;
    } else {
      fb.classList.add('wrong-fb');
      fb.innerHTML = `✗ Incorrect. ${questions[qi].explanation}`;
    }

    document.getElementById(`card-${qi}`).classList.add('answered');
    updateMeta();
  }

  function updateMeta() {
    document.getElementById('answered-count').textContent = `${answered} / 10 answered`;
    document.getElementById('score-live').textContent = `Score: ${score}`;
    document.getElementById('progress-fill').style.width = `${answered * 10}%`;
  }

  function submitQuiz() {
    if (answered < 10) {
      // auto-answer remaining as wrong
      questions.forEach((_, qi) => {
        if (userAnswers[qi] === null) selectOption(qi, -1);
      });
    }
    showResult();
  }

  function showResult() {
    document.getElementById('quiz-wrapper').style.display = 'none';
    const rs = document.getElementById('result-screen');
    rs.style.display = 'block';

    document.getElementById('final-score').textContent = score;
    const pct = score / 10;
    const circumference = 439.82;
    setTimeout(() => {
      document.getElementById('ring-fill').style.strokeDashoffset = circumference * (1 - pct);
    }, 100);

    let title, sub;
    if (score === 10) { title = "🏆 Perfect Score!"; sub = "Outstanding! You aced every question!"; }
    else if (score >= 8) { title = "🎉 Excellent!"; sub = `You got ${score}/10. Great scientific knowledge!`; }
    else if (score >= 6) { title = "👍 Good Job!"; sub = `You got ${score}/10. Keep studying and you'll master it!`; }
    else if (score >= 4) { title = "📚 Keep Practising"; sub = `You got ${score}/10. Review the topics and try again!`; }
    else { title = "🔬 Keep Learning!"; sub = `You got ${score}/10. Science takes practice — don't give up!`; }

    document.getElementById('result-title').textContent = title;
    document.getElementById('result-sub').textContent = sub;
  }

  function retryQuiz() {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-wrapper').style.display = 'block';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  buildQuiz();
</script>
</body>
</html>
