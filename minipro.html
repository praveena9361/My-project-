<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css mini</title>
</head>
<style>
    body{
     
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        margin: 0.5rem;
       
    }
   li{
    border-top: 1px solid #333;
   }   
    ul{
      list-style-position:inside;
      
    }
    li a,
    li a:visited{
       
       text-decoration: none;
       color:333;
    }
    li a:hover,li a:focus{
        background: #333;
        color:whitesmoke;
        cursor: cell;
    }
    

h2{
    padding: 1rem;
    background-color: gold;
    border-radius: 2rem 2rem 0 0;
    cursor:cell;   
}
    nav{
    border:2px solid #000000;
    border-radius: 2rem;
    margin:0 auto 1rem;
    max-width:600px;
    font-size: 3rem;
    line-height: 7rem;

}
li a{
    display: block;
}
p{
    text-align: center;
}
li:last-child a{
    border-radius: 0 0 2rem 2rem;
}
</style>
