<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="typography.css">
    <title>Typography</title>
</head>
<style>body{
    padding:10%;
    font-size: 2rem;
    font-family:Verdana, Geneva, Tahoma, sans-serif;
}
input, button{
    font: inherit;
}
p{
    text-indent: 2em;
    line-height: 1.3;
    letter-spacing: 0.1em;
    word-spacing: 0.5em;
 
    font-weight:400;
}</style>
<body>
  <header>
    <h1>CSS Typography</h1>
  </header>
  <main>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Fuga sit beatae neque optio exercitationem voluptates, id accusamus, unde voluptatem fugiat necessitatibus quod molestias ipsum odio ipsa pariatur. Sit, qui vitae.</p>
<form >
    <label for="name">Name:</label>
    <input id="name" type="text" placeholder="Your name"/>
    <button>Submit</button>
</form> 
</main>
</body>
</html>
